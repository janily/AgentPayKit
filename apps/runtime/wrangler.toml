name = "agentpaykit-runtime-spike"
main = "src/index.ts"
compatibility_date = "2026-07-19"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "agentpaykit"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "../../packages/runtime/migrations"

[[r2_buckets]]
binding = "BLOBS"
bucket_name = "agentpaykit-encrypted-blobs"

[[queues.producers]]
binding = "INVOCATION_QUEUE"
queue = "agentpaykit-invocations"

[[queues.consumers]]
queue = "agentpaykit-invocations"
max_batch_size = 10
max_batch_timeout = 5

[[services]]
binding = "SKILL_HANDLER"
service = "agentpaykit-skill-handler"

[[services]]
binding = "SUCCESS_POLICY"
service = "agentpaykit-success-policy"
